<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OkeyPost - Доставка из Великобритании</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-white text-slate-900">

    <header class="max-w-7xl mx-auto px-4 py-6 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <img src="./src1/img/Vector.png" alt="OkeyPost" class="h-8 md:h-10">
        </div>
        <nav class="hidden lg:flex items-center gap-6 text-sm font-medium text-slate-700">
            <a href="#" class="hover:text-blue-600 transition">Как покупать</a>
            <a href="#" class="hover:text-blue-600 transition">Распродажи</a>
            <a href="#" class="hover:text-blue-600 transition">Цены</a>
            <a href="#" class="hover:text-blue-600 transition">Помощь</a>
            <a href="#" class="hover:text-blue-600 transition">Бонусы</a>
            <a href="#" class="hover:text-blue-600 transition">Блог</a>
            <a href="#" class="hover:text-blue-600 transition">Магазины</a>
        </nav>
        <div class="flex items-center gap-4">
            <a href="#" class="flex items-center gap-2 text-sm font-medium text-slate-700 hover:text-blue-600">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Вход
            </a>
            <button class="hidden sm:block bg-[#00D982] hover:bg-[#00c274] text-white px-6 py-2.5 rounded-full text-sm font-bold transition">
                Связаться с нами
            </button>
        </div>
    </header>

    <section class="max-w-7xl mx-auto px-4 py-6">
        <div class="relative bg-gradient-to-r from-[#5B58AD] via-[#4E88C7] to-[#3BAEE0] rounded-[40px] p-8 md:p-16 overflow-hidden">
            <div class="text-white/70 text-xs mb-8 flex gap-2">
                <a href="#" class="hover:text-white">Главная</a> <span>/</span> <span class="text-white">Часто задаваемые вопросы</span>
            </div>
            <div class="max-w-2xl relative z-10">
                <h1 class="text-3xl md:text-5xl lg:text-6xl font-black text-white mb-4 leading-tight">Отвечаем на вопросы доставки</h1>
            </div>
        </div>
    </section>

    <section class="max-w-7xl mx-auto px-4 py-10">
    <div class="bg-white rounded-3xl shadow-lg shadow-slate-100 p-8 md:p-12 border border-slate-50">
        <label class="block text-sm font-bold text-slate-900 mb-4">Поиск в вопросах и ответах:</label>
        <div class="relative">
            <input type="text" 
                   placeholder="Введите свой вопрос..." 
                   class="w-full border-b-2 border-slate-100 py-4 pr-12 text-lg focus:outline-none focus:border-[#00D982] transition-colors placeholder:text-slate-300">
            <div class="absolute right-0 top-1/2 -translate-y-1/2">
                <svg class="w-6 h-6 text-[#00D982]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>
        </div>
    </div>
</section>
